openapi: 3.1.0
info:
  title: identity-service API
  version: v0
  description: M2 skeleton API for authentication, user hierarchy and permission checks.
servers:
  - url: http://localhost:18081
paths:
  /v1/auth/bootstrap-superuser:
    post:
      summary: Initialize the unique superuser account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                display_name: { type: string }
      responses:
        '201':
          description: Superuser created
        '409':
          description: Superuser already exists
  /v1/auth/token:
    post:
      summary: Issue control-plane token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Token issued
        '401':
          description: Invalid credentials
  /v1/auth/validate:
    get:
      summary: Validate bearer token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token valid
        '401':
          description: Invalid token
  /v1/users:
    post:
      summary: Create subordinate admin or regular user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string }
                password: { type: string }
                display_name: { type: string }
                role:
                  type: string
                  enum: [administrator, regular_user]
                parent_id: { type: string }
      responses:
        '201':
          description: User created
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Caller is not allowed to manage target parent subtree
  /v1/permissions/check:
    post:
      summary: Validate whether actor can access resource owner data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor_id, resource_owner_id]
              properties:
                actor_id: { type: string }
                resource_owner_id: { type: string }
      responses:
        '200':
          description: Permission decision
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
