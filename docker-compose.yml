services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-gateway-postgres
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: llm_gateway
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: llm-gateway-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_HOST_PORT:-12181}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: llm-gateway-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-19092}:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  mock-openai:
    image: kennethreitz/httpbin
    container_name: llm-gateway-mock-openai
    ports:
      - "${MOCK_OPENAI_HOST_PORT:-18088}:80"

  ingress-service:
    build:
      context: .
      dockerfile: backend/services/ingress-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-ingress
    depends_on:
      - postgres
      - redis
      - kafka
      - identity-service
      - apikey-service
      - routing-service
      - prompt-service
      - execution-service
      - mock-openai
    environment:
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8080
      APIKEY_SERVICE_BASE_URL: http://apikey-service:8080
      ROUTING_SERVICE_BASE_URL: http://routing-service:8080
      PROMPT_SERVICE_BASE_URL: http://prompt-service:8080
      EXECUTION_SERVICE_BASE_URL: http://execution-service:8080
    ports:
      - "18080:8080"

  identity-service:
    build:
      context: .
      dockerfile: backend/services/identity-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-identity
    depends_on:
      - postgres
      - redis
    ports:
      - "18081:8080"

  apikey-service:
    build:
      context: .
      dockerfile: backend/services/apikey-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-apikey
    depends_on:
      - postgres
      - redis
    ports:
      - "18082:8080"

  execution-service:
    build:
      context: .
      dockerfile: backend/services/execution-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-execution
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "18083:8080"

  routing-service:
    build:
      context: .
      dockerfile: backend/services/routing-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-routing
    depends_on:
      - postgres
      - redis
    ports:
      - "18084:8080"

  prompt-service:
    build:
      context: .
      dockerfile: backend/services/prompt-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-prompt
    depends_on:
      - postgres
      - redis
    ports:
      - "18085:8080"

  billing-service:
    build:
      context: .
      dockerfile: backend/services/billing-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-billing
    depends_on:
      - postgres
      - kafka
    ports:
      - "18086:8080"

  audit-service:
    build:
      context: .
      dockerfile: backend/services/audit-service/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
    container_name: llm-gateway-audit
    depends_on:
      - postgres
      - kafka
    ports:
      - "18087:8080"

volumes:
  postgres_data:
